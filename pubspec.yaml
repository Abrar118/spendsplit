name: spendsplit
description: "A new Flutter project."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5
  drift: ^2.18.0
  sqlite3_flutter_libs: ^0.5.21
  path_provider: ^2.1.3
  path: ^1.9.0
  go_router: ^14.2.0
  fl_chart: ^0.68.0
  google_fonts: ^6.2.1
  flutter_animate: ^4.5.0
  shimmer: ^3.0.0
  gap: ^3.0.1
  intl: ^0.19.0
  local_auth: ^2.2.0
  lucide_icons: ^0.257.0
  vibration: ^2.0.0
  flutter_slidable: ^3.1.0
  modal_bottom_sheet: ^3.0.0
  shared_preferences: ^2.2.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  drift_dev: ^2.18.0
  build_runner: ^2.4.9
  riverpod_generator: ^2.4.0
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "asset/app-icon.png"
  adaptive_icon_background: "#0A0E1A"
  adaptive_icon_foreground: "asset/app-icon.png"
  remove_alpha_ios: true

flutter:
  uses-material-design: true
  assets:
    - asset/app-icon.png
